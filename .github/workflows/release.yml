name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install

      - name: Generate icon map
        run: pnpm --filter react-3d-lite-icons generate

      - name: Build
        run: pnpm --filter react-3d-lite-icons build

      - name: Publish to npm
        run: pnpm --filter react-3d-lite-icons publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
